<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eetstudio - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Eetstudio</h1>
        <div class="tab-knoppen">
            <button id="btn-home" class="actief" onclick="wisselTab('home')">🏠 Home (Sessies)</button>
            <button id="btn-admin" onclick="wisselTab('admin')">⚙️ Admin (Beheer)</button>
        </div>
    </header>

    <main>
        <div id="tab-home" class="tab-sectie">
            
            <div class="kolom">
                <section class="card">
                    <h2>Nieuwe Sessie Registreren</h2>
                    <form id="form-sessie">
                        <label>Patiënt:</label>
                        <select id="select-patient-sessie" required>
                            <option value="" disabled selected>Kies een patiënt...</option>
                        </select>
                        
                        <label>Therapeut:</label>
                        <select id="select-therapeut" required>
                            <option value="" disabled selected>Kies een therapeut...</option>
                        </select>
                        
                        <label>Datum & Tijd:</label>
                        <input type="datetime-local" id="datum-tijd" required>

                        <label>Bedrag (€):</label>
                        <input type="number" id="bedrag" step="0.01" min="0" placeholder="65.00" required>

                        <label>Betaalstatus:</label>
                        <select id="betaal-status">
                            <option value="onbetaald">Nog niet betaald</option>
                            <option value="Cash">Betaald via Cash</option>
                            <option value="Bancontact">Betaald via Bancontact</option>
                        </select>

                        <button type="submit">Opslaan</button>
                    </form>
                    <div id="msg-sessie" class="bericht"></div>
                </section>
            </div>

            <div class="kolom">
                <section class="card opzoek-card">
                    <h2>Patiënt Opzoeken & Rapport</h2>
                    <label>Selecteer een naam om enkel zijn/haar sessies te zien:</label>
                    <select id="filter-patient" onchange="laadSessies()">
                        <option value="">-- Toon alle recente sessies van iedereen --</option>
                    </select>
                    
                    <div id="sessie-teller" class="teller-vak hidden">
                        Totaal aantal sessies: <span id="teller-getal">0</span>
                    </div>

                    <button id="btn-download" class="hidden" onclick="downloadRapport()" style="background-color: #2980b9; margin-top: 10px; width: 100%;">📥 Download Rapport (Excel/CSV)</button>
                </section>

                <section class="card">
                    <h2>Sessie Overzicht</h2>
                    <table id="tabel-sessies">
                        <thead>
                            <tr>
                                <th>Datum</th>
                                <th>Patiënt</th>
                                <th>Bedrag</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </section>
            </div>
        </div>

        <div id="tab-admin" class="tab-sectie hidden">
            
            <div class="kolom">
                <section class="card">
                    <h2>Nieuwe Patiënt Toevoegen</h2>
                    <form id="form-patient">
                        <label>Voornaam:</label>
                        <input type="text" id="voornaam" required>
                        
                        <label>Achternaam:</label>
                        <input type="text" id="achternaam" required>
                        
                        <label>Geboortedatum:</label>
                        <input type="date" id="geboortedatum" required>
                        
                        <button type="submit">Voeg Patiënt Toe</button>
                    </form>
                    <div id="msg-patient" class="bericht"></div>
                    <div id="err-patient" class="foutmelding"></div>
                </section>
            </div>

            <div class="kolom">
                <section class="card">
                    <h2>Nieuwe Therapeut Toevoegen</h2>
                    <form id="form-therapeut">
                        <label>Naam:</label>
                        <input type="text" id="therapeut-naam" placeholder="Naam collega" required>
                        
                        <label>Discipline:</label>
                        <input type="text" id="therapeut-discipline" placeholder="Bijv. Diëtist of Psycholoog" required>
                        
                        <button type="submit" disabled style="background-color: #95a5a6; cursor: not-allowed;" title="Backend route hiervoor moet nog gemaakt worden">Voeg Therapeut Toe (Binnenkort)</button>
                    </form>
                </section>
            </div>
        </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
